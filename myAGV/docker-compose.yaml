version: "3.8"

services:
  ros2_galactic:
    build: .
    container_name: ros2_galactic

    network_mode: host   # --net=host

    environment:
      #  - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - DISPLAY=${DISPLAY}       # ★ 追加
      #  - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}

    stdin_open: true     # -i
    tty: true            # -t
    restart: "no"        # --rm 相当

    # 重要：デバイスアクセス許可
    privileged: true

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix  # ★ 追加

      #  gitプロジェクト置き場
      - ~/git:/root/git

      # git設定・SSH鍵
      - ~/.gitconfig:/root/.gitconfig
      - ~/.ssh:/root/.ssh

      # colcon workspace
      - ~/btr2026_colcon_ws:/root/colcon_ws

      # 入力デバイス全体をマウント
      - /dev/input:/dev/input

      # relasenseの入力がどれかわからないのでall in
      - /dev:/dev

    # 個別にデバイスを指定する場合（より安全）
    devices:
      - /dev/input/js0:/dev/input/js0

